<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="Daily Pig — today is which pig">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1030"/>
      <stop offset="45%" stop-color="#2b1450"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="snout" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fda4af"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fecdd3"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font-family: ui-rounded, "SF Pro Rounded", "Segoe UI", system-ui, sans-serif; font-weight: 800; fill: #fff7ed; }
      .sub { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #ccfbf1; }
      .chip { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 22px; fill: #134e4a; }
      .badge { font-family: ui-rounded, "SF Pro Rounded", system-ui, sans-serif; font-weight: 700; fill: #fff; font-size: 20px; }
    </style>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <!-- soft blobs -->
  <circle cx="180" cy="120" r="110" fill="#f472b6" opacity="0.18"/>
  <circle cx="1120" cy="520" r="160" fill="#2dd4bf" opacity="0.16"/>
  <circle cx="980" cy="120" r="70" fill="#fbbf24" opacity="0.14"/>

  <!-- decorative stars / sparkles -->
  <g fill="#fde68a" opacity="0.85">
    <path d="M160 480 l8 18 20 2 -16 12 5 19 -17-11 -17 11 5-19 -16-12 20-2z"/>
    <path d="M1080 180 l6 14 15 2 -12 9 4 14 -13-8 -13 8 4-14 -12-9 15-2z"/>
    <circle cx="240" cy="200" r="4"/>
    <circle cx="1040" cy="420" r="3"/>
    <circle cx="90" cy="300" r="3"/>
  </g>

  <!-- left terminal card -->
  <g filter="url(#soft)">
    <rect x="72" y="150" width="430" height="340" rx="28" fill="#0b1220" stroke="#334155" stroke-width="2"/>
    <circle cx="108" cy="186" r="8" fill="#f87171"/>
    <circle cx="134" cy="186" r="8" fill="#fbbf24"/>
    <circle cx="160" cy="186" r="8" fill="#34d399"/>
    <text x="190" y="193" class="chip" fill="#94a3b8" font-size="18">daily-pig · CLI</text>
    <text x="104" y="250" class="chip" fill="#5eead4" font-size="20">$ python3 daily_pig.py today</text>
    <text x="104" y="295" class="chip" fill="#fdba74" font-size="20">今日你是：猪克力</text>
    <text x="104" y="335" class="chip" fill="#a5b4fc" font-size="18">来源：PigHub · sticky 1/day</text>
    <text x="104" y="380" class="chip" fill="#86efac" font-size="18">MEDIA: ~/.daily-pig/hub-images/…</text>
    <text x="104" y="430" class="chip" fill="#64748b" font-size="16">works with any agent that can run shell</text>
  </g>

  <!-- pig mascot -->
  <g transform="translate(690,95)" filter="url(#soft)">
    <!-- ear left -->
    <ellipse cx="70" cy="70" rx="42" ry="58" fill="url(#body)" transform="rotate(-28 70 70)"/>
    <ellipse cx="70" cy="78" rx="22" ry="32" fill="#fda4af" transform="rotate(-28 70 78)"/>
    <!-- ear right -->
    <ellipse cx="250" cy="70" rx="42" ry="58" fill="url(#body)" transform="rotate(28 250 70)"/>
    <ellipse cx="250" cy="78" rx="22" ry="32" fill="#fda4af" transform="rotate(28 250 78)"/>
    <!-- head -->
    <ellipse cx="160" cy="180" rx="140" ry="125" fill="url(#body)"/>
    <!-- cheeks -->
    <ellipse cx="70" cy="200" rx="28" ry="18" fill="#fb7185" opacity="0.55"/>
    <ellipse cx="250" cy="200" rx="28" ry="18" fill="#fb7185" opacity="0.55"/>
    <!-- eyes -->
    <ellipse cx="110" cy="155" rx="16" ry="20" fill="#1e1b4b"/>
    <ellipse cx="210" cy="155" rx="16" ry="20" fill="#1e1b4b"/>
    <circle cx="116" cy="148" r="5" fill="#fff"/>
    <circle cx="216" cy="148" r="5" fill="#fff"/>
    <!-- snout -->
    <ellipse cx="160" cy="220" rx="58" ry="42" fill="url(#snout)"/>
    <ellipse cx="140" cy="220" rx="10" ry="14" fill="#9f1239" opacity="0.75"/>
    <ellipse cx="180" cy="220" rx="10" ry="14" fill="#9f1239" opacity="0.75"/>
    <!-- smile -->
    <path d="M125 255 Q160 278 195 255" fill="none" stroke="#9f1239" stroke-width="6" stroke-linecap="round" opacity="0.55"/>
    <!-- calendar badge -->
    <g transform="translate(210,40)">
      <rect x="0" y="0" width="96" height="92" rx="14" fill="#fff" stroke="#fdba74" stroke-width="4"/>
      <rect x="0" y="0" width="96" height="28" rx="14" fill="#f97316"/>
      <rect x="0" y="14" width="96" height="14" fill="#f97316"/>
      <text x="48" y="62" text-anchor="middle" class="badge" fill="#9a3412" font-size="28">TODAY</text>
      <text x="48" y="82" text-anchor="middle" class="badge" fill="#c2410c" font-size="14">PIG</text>
    </g>
  </g>

  <!-- title block -->
  <text x="72" y="88" class="title" font-size="54">Daily Pig · 今日小猪</text>
  <text x="72" y="128" class="sub" font-size="24">agent-agnostic CLI skill · Claude Code / Codex / OpenCode / Pi / Hermes…</text>

  <!-- bottom chips -->
  <g>
    <rect x="560" y="540" width="150" height="44" rx="22" fill="#f472b6"/>
    <text x="635" y="568" text-anchor="middle" class="badge">PigHub</text>
    <rect x="730" y="540" width="130" height="44" rx="22" fill="#fbbf24"/>
    <text x="795" y="568" text-anchor="middle" class="badge" fill="#78350f">62 local</text>
    <rect x="880" y="540" width="160" height="44" rx="22" fill="#2dd4bf"/>
    <text x="960" y="568" text-anchor="middle" class="badge" fill="#134e4a">1 draw/day</text>
    <rect x="1060" y="540" width="150" height="44" rx="22" fill="#a78bfa"/>
    <text x="1135" y="568" text-anchor="middle" class="badge">zero deps</text>
  </g>
</svg>
