<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="Daily Pig">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdf2f8"/>
      <stop offset="100%" stop-color="#fce7f3"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#9d174d" flood-opacity="0.12"/>
    </filter>
    <style>
      .chat { font-family: -apple-system, "PingFang SC", "Segoe UI", system-ui, sans-serif; fill: #1e293b; }
      .title { font-family: -apple-system, "PingFang SC", "Segoe UI", system-ui, sans-serif; font-weight: 800; fill: #9d174d; }
      .time { font-family: -apple-system, "PingFang SC", "Segoe UI", system-ui, sans-serif; fill: #94a3b8; }
    </style>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- user message (right) -->
  <g filter="url(#shadow)">
    <rect x="920" y="50" width="260" height="68" rx="20" fill="#fff"/>
    <text x="1050" y="92" text-anchor="middle" class="chat" font-size="26">今日小猪</text>
  </g>

  <!-- agent reply: text bubble -->
  <g filter="url(#shadow)">
    <rect x="50" y="150" width="400" height="64" rx="20" fill="#fff"/>
    <text x="250" y="190" text-anchor="middle" class="chat" font-size="24">今日你是：猪队友</text>
  </g>

  <!-- agent reply: image bubble with project pig -->
  <g filter="url(#shadow)">
    <rect x="50" y="230" width="400" height="330" rx="20" fill="#fff"/>
    <!-- project pig.png centered -->
    <image href="gallery/pig.png" x="75" y="255" width="350" height="280" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <!-- caption -->
  <text x="250" y="600" text-anchor="middle" class="time" font-size="16">daily-pig · 每人每天固定一只</text>

  <!-- right side: title block -->
  <g transform="translate(500,200)">
    <text x="0" y="0" class="title" font-size="64">daily-pig</text>
    <text x="0" y="56" class="chat" font-size="32" fill="#be185d">今天是什么小猪</text>
    <text x="0" y="106" class="time" font-size="18">agent skill · CLI · PigHub / 62种</text>

    <!-- three project pigs in a row -->
    <g transform="translate(0,160)">
      <image href="gallery/pig.png" x="0" y="0" width="100" height="80" preserveAspectRatio="xMidYMid meet"/>
      <image href="gallery/zhuge-liang.png" x="130" y="0" width="100" height="80" preserveAspectRatio="xMidYMid meet"/>
      <image href="gallery/teammate-pig.png" x="260" y="0" width="100" height="80" preserveAspectRatio="xMidYMid meet"/>
    </g>
  </g>
</svg>
